<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SISTEMA TERPAC LTDA - LIVE</title>
    <style>
        :root { --verde: #ABED87; --verde-oscuro: #5a8a3d; --gris-bg: #f4f7f6; --azul: #3498db; --amarillo: #f1c40f; --rojo: #ff6b6b; }
        body { font-family: sans-serif; background: var(--gris-bg); padding: 0; margin: 0; text-align: center; }
        .card-compacta { background: white; padding: 25px; border-radius: 20px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); width: 90%; max-width: 400px; margin: 50px auto; border-top: 8px solid var(--verde); box-sizing: border-box; }
        .card-full { background: white; padding: 20px; width: 100%; min-height: 100vh; display: none; box-sizing: border-box; }
        input, select { width: 100%; padding: 15px; margin: 10px 0; border-radius: 12px; border: 1px solid #ccc; font-size: 16px; box-sizing: border-box; }
        .btn { background: var(--verde); border: none; padding: 18px; width: 100%; border-radius: 12px; font-weight: bold; cursor: pointer; font-size: 16px; }
        .btn-salir { background: var(--rojo); color: white; margin-top: 20px; padding: 12px; width: 100%; border-radius: 12px; border: none; font-weight: bold; cursor: pointer; }
        
        /* Pildoras Interactivas */
        .pildoras-horizontal { display: flex; justify-content: space-around; gap: 10px; margin-bottom: 20px; }
        .pildora { background: white; padding: 15px 5px; border-radius: 15px; flex: 1; cursor: pointer; box-shadow: 0 4px 10px rgba(0,0,0,0.1); border-bottom: 6px solid #ccc; transition: 0.3s; }
        .pildora:active { transform: scale(0.95); }
        .pildora h3 { font-size: 11px; margin: 0; color: #666; text-transform: uppercase; }
        .pildora p { font-size: 28px; font-weight: bold; margin: 5px 0 0 0; }

        /* Lista de detalles */
        #contenedor-lista { background: #fff; border: 2px solid #eee; border-radius: 15px; min-height: 300px; max-height: 450px; overflow-y: auto; padding: 15px; text-align: left; }
        .item-lista { padding: 12px; border-bottom: 1px solid #f0f0f0; font-size: 13px; display: flex; justify-content: space-between; }
        .item-lista b { color: #333; }
        .reloj-container { margin: 15px 0; display: flex; justify-content: space-between; align-items: center; font-size: 14px; }
        #reloj { background: var(--azul); color: white; padding: 5px 15px; border-radius: 20px; font-weight: bold; }
    </style>
</head>
<body>

    <!-- LOGIN -->
    <div id="login" class="card-compacta">
        <h2 style="color:var(--verde-oscuro); margin:0;">TERPAC USUARIO</h2>
        <p style="font-size:10px; color:#999; margin-bottom:20px;">SC-APP-V2.0 | LIVE MONITOR</p>
        <input type="text" id="u" placeholder="Usuario">
        <input type="password" id="p" placeholder="Contraseña">
        <button class="btn" onclick="entrar()">INGRESAR</button>
    </div>

    <!-- APP OPERADOR -->
    <div id="ui-app" class="card-compacta" style="display:none;">
        <h3 style="color:var(--verde-oscuro); margin:0;">Captura Datos</h3>
        <input type="text" id="id-in" placeholder="ID PILOTO" oninput="check()">
        <div id="piloto-box" style="display:none; background:#f0fdf0; padding:10px; border-radius:10px; margin:10px 0; font-weight:bold; color:var(--verde-oscuro); border:1px dashed var(--verde);"></div>
        <select id="mov">
            <option>Arribo</option>
            <option>Entrada</option>
            <option>Control 1</option>
            <option>Salida</option>
        </select>
        <select id="prod"><option>SBM</option><option>YC (USA)</option><option>SBW (ARG)</option><option>DDGS</option></select>
        <input type="text" id="cTer" placeholder="Ciclo Terpac">
        <input type="text" id="cEPQ" placeholder="Ciclo E.P.Q">
        <button id="btn-env" class="btn" onclick="enviar()">REGISTRAR 🚀</button>
        <button class="btn-salir" onclick="location.reload()">CERRAR SESIÓN</button>
    </div>

    <!-- MONITOR SUPERVISOR -->
    <div id="ui-supervisor" class="card-full">
        <div style="font-size:12px; color:var(--verde-oscuro); font-weight:bold;">● MONITOR EN TIEMPO REAL</div>
        
        <div class="pildoras-horizontal">
            <div class="pildora" style="border-color:var(--amarillo)" onclick="mostrarDetalle('p')"><h3>Pendientes</h3><p id="c-p" style="color:var(--amarillo)">0</p></div>
            <div class="pildora" style="border-color:var(--azul)" onclick="mostrarDetalle('pr')"><h3>En Carga</h3><p id="c-pr" style="color:var(--azul)">0</p></div>
            <div class="pildora" style="border-color:var(--verde-oscuro)" onclick="mostrarDetalle('d')"><h3>Despacho</h3><p id="c-d" style="color:var(--verde-oscuro)">0</p></div>
        </div>

        <div id="contenedor-lista">Seleccione una categoría arriba para ver la lista de unidades...</div>

        <div class="reloj-container">
            <div id="fecha-actual">--</div>
            <div id="reloj">00:00:00</div>
        </div>
        <button class="btn-salir" onclick="location.reload()">SALIR AL PANEL</button>
    </div>

    <script>
        const pilotos = { "101": { n: "ALBERT GIRON", t: "SANTA MONICA", c: "PURINA", p: "C198CBM" }, "109": { n: "FEDERICO MENDEZ", t: "SANTA MONICA", c: "PURINA", p: "C490BPP" } };
        const URL_SCRIPT = 'TU_URL_AQUI'; // <--- PEGA TU URL DE GOOGLE AQUÍ
        let datosEnVivo = { p: [], pr: [], d: [] };

        function entrar() {
            const u = document.getElementById('u').value.toLowerCase();
            const p = document.getElementById('p').value;
            if(u=="operador" && p=="terpac") { document.getElementById('login').style.display='none'; document.getElementById('ui-app').style.display='block'; }
            else if(u=="supervisor" && p=="terpac1") { 
                document.getElementById('login').style.display='none'; 
                document.getElementById('ui-supervisor').style.display='block'; 
                iniciarReloj(); 
                actualizarDatos(); 
                setInterval(actualizarDatos, 20000); 
            }
            else alert("Error");
        }

        async function actualizarDatos() {
            try {
                const res = await fetch(URL_SCRIPT + "?t=" + new Date().getTime());
                const data = await res.json();
                document.getElementById('c-p').innerText = data.p_count;
                document.getElementById('c-pr').innerText = data.pr_count;
                document.getElementById('c-d').innerText = data.d_count;
                datosEnVivo = data.detalles;
            } catch(e) { console.log("Error de red"); }
        }

        function mostrarDetalle(tipo) {
            const cont = document.getElementById('contenedor-lista');
            let lista = datosEnVivo[tipo] || [];
            let html = `<h4 style="margin:0 0 10px 0; color:#333;">Detalle de Unidades</h4>`;
            if(lista.length == 0) html += "<p>No hay datos.</p>";
            lista.forEach(i => { html += `<div class="item-lista"><b>${i.n}</b> <span>[${i.p}]</span></div>`; });
            cont.innerHTML = html;
        }

        function enviar() {
            const id = document.getElementById('id-in').value;
            if(!pilotos[id]) return alert("ID inválido");
            const btn = document.getElementById('btn-env');
            btn.disabled = true; btn.innerText = "Enviando...";

            const txt = `${id};${pilotos[id].n};${document.getElementById('mov').value};${document.getElementById('prod').value};${pilotos[id].t};${pilotos[id].c};${pilotos[id].p};${document.getElementById('cTer').value};${document.getElementById('cEPQ').value}`;

            fetch(URL_SCRIPT, { method: 'POST', mode: 'no-cors', body: txt })
            .then(() => { alert("OK"); location.reload(); })
            .catch(() => alert("Error"));
        }

        function check() {
            const id = document.getElementById('id-in').value;
            const box = document.getElementById('piloto-box');
            if(pilotos[id]) { box.innerText = "👨‍✈️ " + pilotos[id].n; box.style.display='block'; } else box.style.display='none';
        }

        function iniciarReloj() {
            setInterval(() => {
                const ahora = new Date();
                document.getElementById('reloj').innerText = ahora.toLocaleTimeString();
                document.getElementById('fecha-actual').innerText = ahora.toLocaleDateString();
            }, 1000);
        }
    </script>
</body>
</html>
