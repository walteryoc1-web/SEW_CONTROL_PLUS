<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SISTEMA TERPAC LTDA - SC-APP-V2</title>
    <style>
        :root { --verde: #ABED87; --verde-oscuro: #5a8a3d; --gris-bg: #f4f7f6; --azul: #3498db; --amarillo: #f1c40f; --rojo: #ff6b6b; }
        body { font-family: sans-serif; background: var(--gris-bg); padding: 0; margin: 0; text-align: center; }
        .card { background: white; padding: 25px; border-radius: 20px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); width: 90%; max-width: 450px; margin: 30px auto; border-top: 8px solid var(--verde); box-sizing: border-box; }
        .card-full { background: white; padding: 20px; width: 100%; min-height: 100vh; display: none; box-sizing: border-box; }
        input, select { width: 100%; padding: 15px; margin: 10px 0; border-radius: 12px; border: 1px solid #ccc; font-size: 16px; box-sizing: border-box; }
        .btn { background: var(--verde); border: none; padding: 18px; width: 100%; border-radius: 12px; font-weight: bold; cursor: pointer; font-size: 16px; color: #333; }
        .btn-salir { background: var(--rojo); color: white; margin-top: 20px; padding: 12px; width: 100%; border-radius: 12px; border: none; font-weight: bold; cursor: pointer; }
        
        /* Monitor Interactivo */
        .pildoras { display: flex; justify-content: space-around; gap: 10px; margin-bottom: 20px; }
        .pildora { background: white; padding: 15px 5px; border-radius: 15px; flex: 1; cursor: pointer; box-shadow: 0 4px 10px rgba(0,0,0,0.05); border-bottom: 6px solid #ccc; transition: 0.2s; }
        .pildora:active { transform: scale(0.95); }
        .pildora h3 { font-size: 10px; margin: 0; color: #666; text-transform: uppercase; }
        .pildora p { font-size: 26px; font-weight: bold; margin: 5px 0 0 0; }

        #contenedor-lista { background: #fff; border: 2px solid #eee; border-radius: 15px; min-height: 350px; max-height: 500px; overflow-y: auto; padding: 15px; text-align: left; }
        .item-log { padding: 12px; border-bottom: 1px solid #f2f2f2; font-size: 13px; display: flex; justify-content: space-between; align-items: center; }
        .item-log b { color: #2c3e50; }
        .reloj-box { margin-top: 15px; display: flex; justify-content: space-between; font-size: 13px; color: #777; font-weight: bold; }
        #reloj { background: var(--azul); color: white; padding: 3px 12px; border-radius: 15px; }
    </style>
</head>
<body>

    <!-- PANTALLA LOGIN -->
    <div id="login" class="card">
        <h2 style="color:var(--verde-oscuro); margin:0;">TERPAC LTDA</h2>
        <span style="font-size:10px; color:#999; letter-spacing:1px;">SISTEMA DE GESTIÓN HÍBRIDA</span>
        <div style="margin-top:25px;">
            <input type="text" id="u" placeholder="Usuario">
            <input type="password" id="p" placeholder="Contraseña">
            <button class="btn" onclick="entrar()">INGRESAR AL SISTEMA</button>
        </div>
    </div>

    <!-- PANTALLA OPERADOR -->
    <div id="ui-app" class="card" style="display:none;">
        <h3 style="color:var(--verde-oscuro); margin:0;">Captura Operativa</h3>
        <input type="number" id="id-in" placeholder="ID PILOTO" oninput="check()">
        <div id="piloto-box" style="display:none; background:#f0fdf0; padding:12px; border-radius:10px; margin:10px 0; font-weight:bold; color:var(--verde-oscuro); border:1px dashed var(--verde); text-align:left;"></div>
        
        <select id="mov">
            <option>Arribo</option>
            <option>Entrada</option>
            <option>Control 1</option>
            <option>Salida</option>
        </select>
        
        <select id="prod">
            <option>SBM</option><option>YC (USA)</option><option>SBW (ARG)</option>
            <option>YC (BR)</option><option>YC (ARG)</option><option>SRW</option><option>DDGS</option>
        </select>

        <input type="text" id="cTer" placeholder="Ciclo Terpac">
        <input type="text" id="cEPQ" placeholder="Ciclo E.P.Q">
        
        <button id="btn-env" class="btn" style="margin-top:10px;" onclick="enviar()">REGISTRAR DATOS 🚀</button>
        <button class="btn-salir" onclick="location.reload()">CERRAR SESIÓN</button>
    </div>

    <!-- PANTALLA SUPERVISOR -->
    <div id="ui-supervisor" class="card-full">
        <div style="color:var(--verde-oscuro); font-weight:bold; margin-bottom:15px; font-size:14px;">● MONITOR LOGÍSTICO EN VIVO</div>
        
        <div class="pildoras">
            <div class="pildora" style="border-color:var(--amarillo)" onclick="mostrarDetalle('p')">
                <h3>Pendientes</h3><p id="num-p" style="color:var(--amarillo)">0</p>
            </div>
            <div class="pildora" style="border-color:var(--azul)" onclick="mostrarDetalle('pr')">
                <h3>En Carga</h3><p id="num-pr" style="color:var(--azul)">0</p>
            </div>
            <div class="pildora" style="border-color:var(--verde-oscuro)" onclick="mostrarDetalle('d')">
                <h3>Despacho</h3><p id="num-d" style="color:var(--verde-oscuro)">0</p>
            </div>
        </div>

        <div id="contenedor-lista">Seleccione una categoría para ver listado...</div>

        <div class="reloj-box">
            <div id="fecha-actual">--</div>
            <div id="reloj">00:00:00</div>
        </div>
        <button class="btn-salir" onclick="location.reload()">SALIR AL PANEL</button>
    </div>

    <script>
        const pilotos = { 
            "101": { n: "ALBERT GIRON", t: "SANTA MONICA", c: "AGRIBRANDS PURINA", p: "C198CBM" },
            "102": { n: "CESAR ADOLFO MIRANDA COJ", t: "SANTA MONICA", c: "AGRIBRANDS PURINA", p: "C129BZH" },
            "103": { n: "EFRAIN ESTRADA", t: "SANTA MONICA", c: "AGRIBRANDS PURINA", p: "C474BKX" },
            "104": { n: "JUAN GARCIA", t: "SANTA MONICA", c: "AGRIBRANDS PURINA", p: "C363BPP" },
            "105": { n: "MYNOR JOSUE GUZMAN RIVERA", t: "SANTA MONICA", c: "AGRIBRANDS PURINA", p: "C826BZQ" },
            "106": { n: "GERSON GALVEZ", t: "SANTA MONICA", c: "AGRIBRANDS PURINA", p: "C795BPZ" },
            "107": { n: "ROBERTO MARTINEZ", t: "SANTA MONICA", c: "AGRIBRANDS PURINA", p: "C635BGC" },
            "108": { n: "ESDYBERS GALICIA", t: "SANTA MONICA", c: "AGRIBRANDS PURINA", p: "C666BZJ" },
            "109": { n: "FEDERICO MENDEZ", t: "SANTA MONICA", c: "AGRIBRANDS PURINA", p: "C490BPP" },
            "110": { n: "FELIX PERALTA", t: "SANTA MONICA", c: "AGRIBRANDS PURINA", p: "C026BBF" },
            "111": { n: "FREDY PEREZ", t: "SANTA MONICA", c: "AGRIBRANDS PURINA", p: "C775BMT" },
            "112": { n: "LUIS AJCALON", t: "SANTA MONICA", c: "AGRIBRANDS PURINA", p: "C015BYS" },
            "113": { n: "LUIS PINEDA", t: "SANTA MONICA", c: "AGRIBRANDS PURINA", p: "C092BNN" },
            "114": { n: "ELVIS AVILA", t: "SANTA MONICA", c: "AGRIBRANDS PURINA", p: "C360BWD" },
            "115": { n: "JORGE HERNANDEZ", t: "SANTA MONICA", c: "AGRIBRANDS PURINA", p: "C346BWB" },
            "116": { n: "OSCAR AZAÑON", t: "SANTA MONICA", c: "AGRIBRANDS PURINA", p: "C781BMQ" },
            "117": { n: "REGINALDO GARCIA", t: "SANTA MONICA", c: "AGRIBRANDS PURINA", p: "C634BGC" },
            "118": { n: "RICARDO MIRANDA COJ", t: "SANTA MONICA", c: "AGRIBRANDS PURINA", p: "C904BXF" },
            "119": { n: "WILDER NAJERA", t: "SANTA MONICA", c: "AGRIBRANDS PURINA", p: "C488BVM" },
            "120": { n: "JHONY PINZON", t: "SANTA MONICA", c: "AGRIBRANDS PURINA", p: "C146BQR" }
        };

        const URL_SCRIPT = 'https://script.google.com';
        let cacheDetalles = { p: [], pr: [], d: [] };

        function entrar() {
            const user = document.getElementById('u').value.toLowerCase().trim();
            const pass = document.getElementById('p').value;
            if(user == "operador" && pass == "terpac") {
                document.getElementById('login').style.display='none'; 
                document.getElementById('ui-app').style.display='block';
            } 
            else if(user == "supervisor" && pass == "terpac1") {
                document.getElementById('login').style.display='none'; 
                document.getElementById('ui-supervisor').style.display='block';
                iniciarReloj();
                actualizarMonitor();
                setInterval(actualizarMonitor, 30000); // Auto-refresco cada 30 seg
            }
            else alert("Acceso Incorrecto");
        }

        async function actualizarMonitor() {
            try {
                const res = await fetch(URL_SCRIPT + "?t=" + new Date().getTime());
                const data = await res.json();
                document.getElementById('num-p').innerText = data.p_count;
                document.getElementById('num-pr').innerText = data.pr_count;
                document.getElementById('num-d').innerText = data.d_count;
                cacheDetalles = data.detalles;
            } catch (e) { console.log("Error de conexión"); }
        }

        function mostrarDetalle(tipo) {
            const cont = document.getElementById('contenedor-lista');
            let lista = cacheDetalles[tipo] || [];
            let titulo = tipo=='p' ? '⏳ PENDIENTES' : tipo=='pr' ? '🚚 EN PROCESO' : '✅ DESPACHADOS';
            let color = tipo=='p' ? 'var(--amarillo)' : tipo=='pr' ? 'var(--azul)' : 'var(--verde-oscuro)';
            
            let html = `<h4 style="margin:0 0 15px 0; color:${color}; border-bottom:2px solid #eee; padding-bottom:5px;">${titulo}</h4>`;
            if(lista.length == 0) html += "<p style='color:#999; text-align:center;'>No hay registros actuales</p>";
            
            lista.forEach(item => {
                html += `<div class="item-log">
                    <div><b>${item.n}</b><br><small style="color:#666;">ID: ${item.id}</small></div>
                    <div style="font-weight:bold; color:#444;">${item.p}</div>
                </div>`;
            });
            cont.innerHTML = html;
        }

        function enviar() {
            const id = document.getElementById('id-in').value;
            if(!pilotos[id]) return alert("ID NO VÁLIDO");
            
            const btn = document.getElementById('btn-env');
            btn.disabled = true; btn.innerText = "REGISTRANDO...";

            const txt = `${id};${pilotos[id].n};${document.getElementById('mov').value};${document.getElementById('prod').value};${pilotos[id].t};${pilotos[id].c};${pilotos[id].p};${document.getElementById('cTer').value};${document.getElementById('cEPQ').value}`;

            fetch(URL_SCRIPT, { method: 'POST', mode: 'no-cors', body: txt })
            .then(() => { 
                alert("✅ DATOS GUARDADOS"); 
                document.getElementById('id-in').value = "";
                document.getElementById('piloto-box').style.display='none';
            })
            .catch(() => alert("ERROR DE ENVÍO"))
            .finally(() => { btn.disabled = false; btn.innerText = "REGISTRAR DATOS 🚀"; });
        }

        function check() {
            const id = document.getElementById('id-in').value;
            const box = document.getElementById('piloto-box');
            if(pilotos[id]) { box.innerText = "👨‍✈️ Piloto: " + pilotos[id].n; box.style.display='block'; } else box.style.display='none';
        }

        function iniciarReloj() {
            setInterval(() => {
                const ahora = new Date();
                document.getElementById('reloj').innerText = ahora.toLocaleTimeString('es-GT', { hour12: false });
                document.getElementById('fecha-actual').innerText = ahora.toLocaleDateString('es-GT', { weekday: 'short', day: 'numeric', month: 'short' });
            }, 1000);
        }
    </script>
</body>
</html>
