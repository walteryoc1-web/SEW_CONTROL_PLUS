<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SISTEMA TERPAC LTDA</title>
    <style>
        :root { --verde: #ABED87; --verde-oscuro: #5a8a3d; --gris-bg: #f4f7f6; }
        body { font-family: sans-serif; background: var(--gris-bg); padding: 15px; text-align: center; margin: 0; }
        .card { background: white; padding: 25px; border-radius: 20px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); max-width: 400px; margin: 20px auto; border-top: 8px solid var(--verde); position: relative; }
        input, select { width: 100%; padding: 15px; margin: 10px 0; border-radius: 12px; border: 1px solid #ccc; font-size: 16px; box-sizing: border-box; }
        .btn { background: var(--verde); border: none; padding: 18px; width: 100%; border-radius: 12px; font-weight: bold; cursor: pointer; color: #333; font-size: 16px; }
        .btn-salir { background: #ff6b6b; color: white; margin-top: 20px; padding: 12px; font-size: 14px; width: 100%; border-radius: 12px; border: none; font-weight: bold; cursor: pointer; }
        
        #piloto-box { font-weight: bold; color: var(--verde-oscuro); margin: 10px 0; display: none; padding: 15px; background: #f0fdf0; border-radius: 10px; border: 1px dashed var(--verde); text-align: left; }

        /* DASHBOARD SUPERVISOR */
        .pildoras { display: flex; flex-direction: column; gap: 10px; margin-bottom: 20px; }
        .pildora { background: white; padding: 12px 20px; border-radius: 15px; text-align: left; box-shadow: 0 4px 10px rgba(0,0,0,0.05); border-left: 8px solid var(--verde-oscuro); display: flex; justify-content: space-between; align-items: center; }
        .pildora h3 { font-size: 11px; margin: 0; color: #777; text-transform: uppercase; max-width: 120px; }
        .pildora p { font-size: 24px; font-weight: bold; margin: 0; color: #222; }
        
        /* CONTENEDOR GRÁFICA (ESPACIO RESERVADO) */
        #contenedor-grafica { width: 100%; height: 150px; background: #f9f9f9; border: 2px dashed #ddd; border-radius: 15px; display: flex; align-items: center; justify-content: center; color: #aaa; font-size: 12px; margin-bottom: 15px; }

        /* RELOJ PEQUEÑO INFERIOR */
        .footer-info { display: flex; justify-content: space-between; align-items: center; margin-top: 10px; padding: 0 5px; }
        #reloj { font-size: 14px; font-weight: bold; color: #555; background: #eee; padding: 4px 10px; border-radius: 20px; }
        #fecha-actual { font-size: 11px; color: #999; text-align: left; text-transform: capitalize; }

        .live-status { color: #2ecc71; font-size: 11px; font-weight: bold; display: flex; align-items: center; gap: 6px; justify-content: center; margin-bottom: 15px; }
        .dot { width: 7px; height: 7px; background: #2ecc71; border-radius: 50%; animation: pulse 2s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }
    </style>
</head>
<body>

    <!-- LOGIN -->
    <div id="login" class="card">
        <h2 style="color:var(--verde-oscuro); margin-top:0;">TERPAC LOGIN</h2>
        <input type="text" id="u" placeholder="Usuario">
        <input type="password" id="p" placeholder="Contraseña">
        <button class="btn" onclick="entrar()">INGRESAR</button>
    </div>

    <!-- OPERADOR -->
    <div id="ui-app" class="card" style="display:none;">
        <h3 style="margin-top:0; color:var(--verde-oscuro);">Captura Terpac</h3>
        <input type="text" id="id-in" placeholder="ID PILOTO (101, 102)" oninput="check()">
        <div id="piloto-box"></div>
        <select id="mov"><option>Arribo</option><option>Entrada</option><option>Salida</option></select>
        <select id="prod"><option>SBM</option><option>YC (USA)</option><option>SWW</option></select>
        <button id="btn-env" class="btn" onclick="enviar()">REGISTRAR DATOS 🚀</button>
        
        <button class="btn-salir" onclick="location.reload()">CERRAR SESIÓN</button>
    </div>

    <!-- SUPERVISOR -->
    <div id="ui-supervisor" class="card" style="display:none;">
        <div class="live-status"><div class="dot"></div> MONITOR TERPAC ACTIVO</div>
        
        <div class="pildoras">
            <div class="pildora" style="border-left-color: #f1c40f;">
                <h3>Pendiente de Ingreso</h3>
                <p>08</p>
            </div>
            <div class="pildora" style="border-left-color: #3498db;">
                <h3>En Proceso de Carga</h3>
                <p>04</p>
            </div>
            <div class="pildora" style="border-left-color: #2ecc71;">
                <h3>Despachadas</h3>
                <p>12</p>
            </div>
        </div>

        <!-- ESPACIO PARA LA GRÁFICA MAÑANA -->
        <div id="contenedor-grafica">Área reservada para Gráfica</div>

        <div class="footer-info">
            <div id="fecha-actual">Cargando...</div>
            <div id="reloj">00:00:00</div>
        </div>

        <button class="btn-salir" onclick="location.reload()" style="margin-top: 15px;">SALIR AL LOGIN</button>
    </div>

    <script>
        const pilotos = { "101": { n: "Juan Perez" }, "102": { n: "Pedro Marmol" } };

        function entrar() {
            const user = document.getElementById('u').value.toLowerCase().trim();
            const pass = document.getElementById('p').value;

            if(user == "operador 1" && pass == "terpac1") {
                document.getElementById('login').style.display='none'; 
                document.getElementById('ui-app').style.display='block';
            } 
            else if(user == "supervisor 1" && pass == "terpac2") {
                document.getElementById('login').style.display='none'; 
                document.getElementById('ui-supervisor').style.display='block';
                iniciarReloj();
            }
            else { alert("Acceso Incorrecto"); }
        }

        function iniciarReloj() {
            setInterval(() => {
                const ahora = new Date();
                document.getElementById('reloj').innerText = ahora.toLocaleTimeString('es-GT', { hour12: false });
                document.getElementById('fecha-actual').innerText = ahora.toLocaleDateString('es-GT', { weekday: 'short', day: 'numeric', month: 'short' });
            }, 1000);
        }

        function check() {
            const id = document.getElementById('id-in').value.trim();
            const box = document.getElementById('piloto-box');
            if(pilotos[id]) { 
                box.innerText = "👨‍✈️ Piloto: " + pilotos[id].n; 
                box.style.display='block'; 
            } else { box.style.display='none'; }
        }

        function enviar() {
            const id = document.getElementById('id-in').value.trim();
            if(!pilotos[id]) return alert("ID no encontrado");
            const btn = document.getElementById('btn-env');
            btn.innerText = "Enviando..."; btn.disabled = true;

            const URL_SCRIPT = 'https://script.google.com';
            const textoFinal = `ID: ${id} | Piloto: ${pilotos[id].n} | Mov: ${document.getElementById('mov').value} | Prod: ${document.getElementById('prod').value}`;

            fetch(URL_SCRIPT, {
                method: 'POST',
                mode: 'no-cors', 
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ "datos": textoFinal })
            }).then(() => {
                alert("✅ REGISTRO ENVIADO");
                location.reload();
            }).catch(err => {
                alert("Error de envío.");
                btn.disabled = false; btn.innerText = "REINTENTAR";
            });
        }
    </script>
</body>
</html>
